# Coroot CE — lab k3d (namespace observability)
# UI: https://coroot-npd.co qua k3d/coroot-ingress.yaml (không dùng spec.ingress trong CR)
# OTLP: coroot-coroot.observability:4317 (gRPC) / :8080 (HTTP)

storage:
  size: 5Gi
  className: local-path

clickhouse:
  shards: 1
  replicas: 1
  storage:
    size: 10Gi
    className: local-path

prometheus:
  storage:
    size: 5Gi
    className: local-path

nodeAgent:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 512Mi

clusterAgent:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi
