# Coroot CE — OpenShift dev-ocp (namespace observability)
# UI: oc expose svc coroot-coroot -n observability --hostname=coroot.apps.ocp01.npd.co
# OTLP: coroot-coroot.observability:4317 (gRPC) / :8080 (HTTP)

storage:
  size: 5Gi
  className: nfs-csi

clickhouse:
  shards: 1
  replicas: 1
  storage:
    size: 10Gi
    className: nfs-csi

prometheus:
  storage:
    size: 5Gi
    className: nfs-csi

# OCP worker có tracefs/debugfs — có thể bật node-agent sau khi lab ổn định
nodeAgent:
  nodeSelector:
    coroot-node-agent: enabled
  ebpfTracer:
    enabled: false
  ebpfProfiler:
    enabled: false
  logCollector:
    collectLogBasedMetrics: false
    collectLogEntries: false

clusterAgent:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi
