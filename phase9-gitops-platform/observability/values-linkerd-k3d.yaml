# Linkerd control-plane — k3d lab (cniEnabled=false, init container proxy)
# Identity TLS: certs k3d-lab/ (Helm fileParameters trong Application ArgoCD) — LAB ONLY

cniEnabled: false
controllerReplicas: 1
enablePodAntiAffinity: false

proxy:
  resources:
    cpu:
      request: 50m
    memory:
      request: 20Mi
      limit: 250Mi

controllerResources:
  cpu:
    request: 50m
  memory:
    request: 128Mi
    limit: 512Mi

heartbeatSchedule: ""

podMonitor:
  enabled: false

enablePodDisruptionBudget: false
