# Linkerd control-plane — k3d lab (cniEnabled=false, init container proxy)
# Bắt buộc: scripts/generate-linkerd-certs.sh → secret + configmap (ns linkerd)
# Helm: identity.externalCA=true + issuer scheme kubernetes.io/tls (trong Application)

cniEnabled: false
controllerReplicas: 1
enablePodAntiAffinity: false

proxy:
  resources:
    cpu:
      request: 50m
    memory:
      request: 20Mi
      limit: 250Mi

controllerResources:
  cpu:
    request: 50m
  memory:
    request: 128Mi
    limit: 512Mi

heartbeatSchedule: ""

podMonitor:
  enabled: false

enablePodDisruptionBudget: false
