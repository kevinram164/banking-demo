# Linkerd control-plane — k3d lab (cniEnabled=false, init container proxy)
# Identity: manifest wave 0 (linkerd-identity-bootstrap) + externalCA:true trong Application

cniEnabled: false
controllerReplicas: 1
enablePodAntiAffinity: false

# Viz cần policy controller (AuthorizationPolicy, Server CRs)
policyController:
  enabled: true

proxy:
  resources:
    cpu:
      request: 50m
    memory:
      request: 20Mi
      limit: 250Mi

controllerResources:
  cpu:
    request: 50m
  memory:
    request: 256Mi
    limit: 768Mi

heartbeatSchedule: ""

podMonitor:
  enabled: false

enablePodDisruptionBudget: false
