# Phase 9 — OpenTelemetry + Linkerd (merge vào banking Helm apps trên dev-ocp)
# OTEL Collector ns observability → Coroot

global:
  observability:
    otelEndpoint: "http://opentelemetry-collector.observability.svc.cluster.local:4317"
    otelProtocol: "grpc"

namespace:
  annotations:
    linkerd.io/inject: enabled

api-producer:
  extraEnv:
    OTEL_EXPORTER_OTLP_ENDPOINT: "http://opentelemetry-collector.observability.svc.cluster.local:4317"
    OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
    OTEL_SERVICE_NAME: "api-producer"
    OTEL_RESOURCE_ATTRIBUTES: "deployment.environment=dev-ocp"

auth-service:
  extraEnv:
    OTEL_EXPORTER_OTLP_ENDPOINT: "http://opentelemetry-collector.observability.svc.cluster.local:4317"
    OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
    OTEL_SERVICE_NAME: "auth-service"
    OTEL_RESOURCE_ATTRIBUTES: "deployment.environment=dev-ocp"

