    OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
    OTEL_SERVICE_NAME: "transfer-service"
    OTEL_RESOURCE_ATTRIBUTES: "deployment.environment=dev-ocp"

notification-service:
