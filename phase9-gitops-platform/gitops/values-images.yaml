# Image tags — CI (Jenkins) cập nhật trên nhánh dev-k3d
# Registry lab k3d: harbor-npd.co

global:
  imageRegistry: harbor-npd.co/banking-demo

# Helm chart đọc imagePullSecrets theo từng service (không dùng global)
x-harbor-pull: &harborPullSecrets
  - name: harbor-registry

api-producer:
  imagePullSecrets: *harborPullSecrets
  image:
    repository: harbor-npd.co/banking-demo/api-producer
    tag: 0cfc993
    pullPolicy: Always

auth-service:
  imagePullSecrets: *harborPullSecrets
  image:
    repository: harbor-npd.co/banking-demo/auth-service
    tag: 0cfc993
    pullPolicy: Always

account-service:
  imagePullSecrets: *harborPullSecrets
  image:
    repository: harbor-npd.co/banking-demo/account-service
    tag: 0cfc993
    pullPolicy: Always

transfer-service:
  imagePullSecrets: *harborPullSecrets
  image:
    repository: harbor-npd.co/banking-demo/transfer-service
    tag: 0cfc993
    pullPolicy: Always

notification-service:
  imagePullSecrets: *harborPullSecrets
  image:
    repository: harbor-npd.co/banking-demo/notification-service
    tag: 0cfc993
    pullPolicy: Always

frontend:
  imagePullSecrets: *harborPullSecrets
  image:
    repository: harbor-npd.co/banking-demo/frontend
    tag: latest
    pullPolicy: Always
