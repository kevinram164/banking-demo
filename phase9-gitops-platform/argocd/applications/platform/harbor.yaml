# Harbor — lab k3d: harbor-npd.co, storageClass local-path
# Xem harbor/README.md: TLS, admin password, robot accounts
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-harbor
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: phase9-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: banking-platform
  source:
    repoURL: https://helm.goharbor.io
    chart: harbor
    targetRevision: 1.15.0
    helm:
      releaseName: harbor
      values: |
        expose:
          type: ingress
          tls:
            enabled: false
          ingress:
            hosts:
              core: harbor-npd.co
            className: traefik
        externalURL: https://harbor-npd.co
        harborAdminPassword: "ChangeMe-Harbor-Admin"
        persistence:
          enabled: true
          persistentVolumeClaim:
            registry:
              storageClass: local-path
              size: 20Gi
            jobservice:
              jobLog:
                storageClass: local-path
            database:
              storageClass: local-path
            redis:
              storageClass: local-path
            trivy:
              storageClass: local-path
  destination:
    server: https://kubernetes.default.svc
    namespace: platform
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
