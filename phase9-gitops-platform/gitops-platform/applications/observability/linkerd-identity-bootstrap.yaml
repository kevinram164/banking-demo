# Linkerd identity trust anchor + issuer (wave 0) — Helm externalCA:true dùng các resource này
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: observability-linkerd-identity-bootstrap
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: phase9-gitops
    app.kubernetes.io/component: observability
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: banking-platform
  source:
    repoURL: https://github.com/kevinram164/banking-demo.git
    targetRevision: dev-k3d
    path: phase9-gitops-platform/observability/manifests/linkerd-identity-k3d
  destination:
    server: https://kubernetes.default.svc
    namespace: linkerd
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: false
      selfHeal: true
