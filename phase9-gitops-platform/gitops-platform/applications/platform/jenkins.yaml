# Jenkins — dev-ocp: UI https://jenkins-platform.apps.ocp01.npd.co
# Credentials: Vault secret/platform/jenkins → ESO → JCasC (không tạo thủ công trên UI)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-jenkins
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: phase9-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: banking-platform
  source:
    repoURL: https://charts.jenkins.io
    chart: jenkins
    targetRevision: 5.7.27
    helm:
      releaseName: jenkins
      values: |
        persistence:
          enabled: true
          storageClass: nfs-csi
          size: 8Gi
          accessMode: ReadWriteOnce
        controller:
          image:
            registry: docker.io
            repository: jenkins/jenkins
            tag: "lts-jdk17"
            pullPolicy: Always
          admin:
            existingSecret: jenkins-platform-credentials
            userKey: jenkins-admin-user
            passwordKey: jenkins-admin-password
          jenkinsUrl: https://jenkins-platform.apps.ocp01.npd.co/
          containerEnv:
            - name: HARBOR_USERNAME
              valueFrom:
                secretKeyRef:
                  name: jenkins-platform-credentials
                  key: harbor_username
            - name: HARBOR_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: jenkins-platform-credentials
                  key: harbor_password
            - name: GITHUB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: jenkins-platform-credentials
                  key: github_username
            - name: GITHUB_PAT
              valueFrom:
                secretKeyRef:
                  name: jenkins-platform-credentials
                  key: github_pat
          installLatestPlugins: false
          installPlugins:
            - kubernetes
            - workflow-aggregator
            - workflow-multibranch
            - git
            - configuration-as-code
            - pipeline-groovy-lib
          overwritePlugins: true
          overwritePluginsFromImage: true
          initializeOnce: false
          podSecurityContextOverride:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
            runAsNonRoot: true
            supplementalGroups: [1000]
          containerSecurityContext:
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
            runAsUser: 1000
            runAsGroup: 1000
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
            limits:
              memory: 2Gi
          initContainerResources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              memory: 2Gi
          JCasC:
            defaultConfig: true
            configScripts:
              banking-credentials: |
                credentials:
                  system:
                    domainCredentials:
                      - credentials:
                          - usernamePassword:
                              scope: GLOBAL
                              id: "harbor-ci-push"
                              username: "${HARBOR_USERNAME}"
                              password: "${HARBOR_PASSWORD}"
                              description: "Harbor Kaniko push (Vault → ESO)"
                          - usernamePassword:
                              scope: GLOBAL
                              id: "github-gitops-push"
                              username: "${GITHUB_USERNAME}"
                              password: "${GITHUB_PAT}"
                              description: "GitHub PAT GitOps push (Vault → ESO)"
              banking-shared-library: |
                unclassified:
                  globalLibraries:
                    libraries:
                      - name: "banking-demo"
                        defaultVersion: "dev-ocp"
                        retriever:
                          modernSCM:
                            libraryPath: "phase9-gitops-platform/jenkins-shared-library"
                            scm:
                              git:
                                remote: "https://github.com/kevinram164/banking-demo.git"
          ingress:
            enabled: false
        agent:
          enabled: true
          kubernetes:
            namespace: platform
  destination:
    server: https://kubernetes.default.svc
    namespace: platform
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
