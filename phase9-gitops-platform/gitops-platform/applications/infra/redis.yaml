# Redis HA — Phase 5 (Bitnami), ns redis
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infra-redis
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: phase9-gitops
    app.kubernetes.io/component: redis
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: banking-platform
  sources:
    - repoURL: https://charts.bitnami.com/bitnami
      chart: redis
      targetRevision: 20.6.2
      helm:
        releaseName: redis-ha
        valueFiles:
          - $values/phase5-architecture-refactor/redis-ha/values-redis-ha.yaml
        values: |
          global:
            defaultStorageClass: nfs-csi
          master:
            persistence:
              storageClass: nfs-csi
          replica:
            persistence:
              storageClass: nfs-csi
    - repoURL: https://github.com/kevinram164/banking-demo.git
      targetRevision: dev-ocp
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: redis
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: false
      selfHeal: true
