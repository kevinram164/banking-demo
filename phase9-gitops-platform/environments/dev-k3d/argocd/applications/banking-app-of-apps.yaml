# Banking apps only — dev-k3d (bật trước khi infra/platform sẵn sàng)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: banking-app-of-apps-dev-k3d
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: phase9-gitops
    banking-demo/environment: dev-k3d
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: banking-platform
  source:
    repoURL: https://github.com/YOUR_ORG/banking-demo.git
    targetRevision: dev-k3d
    path: phase9-gitops-platform/environments/dev-k3d/argocd/applications/banking
    directory:
      recurse: false
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
