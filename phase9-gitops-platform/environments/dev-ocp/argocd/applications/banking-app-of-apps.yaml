apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: banking-app-of-apps-dev-ocp
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: phase9-gitops
    banking-demo/environment: dev-ocp
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: banking-platform
  source:
    repoURL: https://github.com/kevinram164/banking-demo.git
    targetRevision: dev-ocp
    path: phase9-gitops-platform/environments/dev-ocp/argocd/applications/banking
    directory:
      recurse: false
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
