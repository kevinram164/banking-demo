# Banking API — npd-banking.co/api → Kong proxy (ns kong qua kong-proxy-ext)
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: npd-banking-api
  namespace: banking
  labels:
    app.kubernetes.io/name: banking-demo
    app.kubernetes.io/component: api
    banking-demo/environment: dev-ocp
  annotations:
    argocd.argoproj.io/sync-wave: "4"
    haproxy.router.openshift.io/timeout: 600s
spec:
  host: npd-banking.co
  path: /api
  to:
    kind: Service
    name: kong-proxy-ext
    weight: 100
  port:
    targetPort: 8000
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
