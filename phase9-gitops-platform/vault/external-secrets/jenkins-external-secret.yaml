# Jenkins credentials — sync từ Vault secret/platform/jenkins
# Pipeline dùng ID cố định: harbor-ci-push, github-gitops-push (JCasC inject từ env)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: jenkins-platform-credentials
  namespace: platform
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: jenkins-platform-credentials
    creationPolicy: Owner
  data:
    - secretKey: harbor_username
      remoteRef:
        key: platform/jenkins
        property: harbor_username
    - secretKey: harbor_password
      remoteRef:
        key: platform/jenkins
        property: harbor_password
    - secretKey: github_username
      remoteRef:
        key: platform/jenkins
        property: github_username
    - secretKey: github_pat
      remoteRef:
        key: platform/jenkins
        property: github_pat
    - secretKey: jenkins-admin-user
      remoteRef:
        key: platform/jenkins
        property: admin_username
    - secretKey: jenkins-admin-password
      remoteRef:
        key: platform/jenkins
        property: admin_password
    - secretKey: github_webhook_secret
      remoteRef:
        key: platform/jenkins
        property: github_webhook_secret
