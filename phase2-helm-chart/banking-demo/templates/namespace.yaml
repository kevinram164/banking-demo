{{- if .Values.namespace.enabled }}
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.global.namespace }}
  {{- with .Values.namespace.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  labels:
    {{- include "banking-demo.labels" . | nindent 4 }}
    app.kubernetes.io/name: banking-demo
    phase: "2"
{{- end }}
