# Phase 5 - Redis HA (Bitnami Redis, master + replica)
# Dùng: helm upgrade -i redis bitnami/redis -n redis -f values-redis-ha.yaml

global:
  defaultStorageClass: local-path   # k3d/lab — override mọi PVC trong chart
  security:
    allowInsecureImages: true       # bắt buộc khi dùng bitnamilegacy (Docker Hub)

# Image legacy — tag do chart pin; docker.io/bitnami/* thường 404 trên lab 2025+
image:
  registry: docker.io
  repository: bitnamilegacy/redis

architecture: replication

auth:
  enabled: true
  password: "Mbfs@2025"
  sentinel: true

####################
# MASTER
####################
master:
  persistence:
    enabled: true
    size: 20Gi
    storageClass: local-path   # k3d/lab; production cluster: nfs-client

  podAntiAffinityPreset: soft

####################
# REPLICA
####################
replica:
  replicaCount: 3

  persistence:
    enabled: true
    size: 20Gi
    storageClass: local-path   # k3d/lab; production cluster: nfs-client

  podAntiAffinityPreset: soft

####################
# SENTINEL (HA auto-failover)
####################
sentinel:
  enabled: true
  replicas: 3
  image:
    registry: docker.io
    repository: bitnamilegacy/redis-sentinel

####################
# METRICS (Prometheus redis-exporter sidecar)
####################
metrics:
  enabled: true
  image:
    registry: docker.io
    repository: bitnamilegacy/redis-exporter
  resources:
    requests:
      memory: "32Mi"
      cpu: "50m"
    limits:
      memory: "64Mi"
      cpu: "200m"
  service:
    port: 9121

# Connection string cho app:
# redis://redis-master.redis.svc.cluster.local:6379/0
