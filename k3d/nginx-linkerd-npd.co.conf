# Nginx LB — Linkerd Viz dashboard (Mô hình SSL 1)
# Copy: sudo cp nginx-linkerd-npd.co.conf /etc/nginx/conf.d/
# Backend: web service trong ns linkerd-viz

upstream linkerd_viz_npd_ingress {
    server 127.0.0.1:9080;
    keepalive 32;
}

server {
    listen 80;
    server_name linkerd-npd.co;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name linkerd-npd.co;

    ssl_certificate     /home/kevin/argocd-self-signed/tls.crt;
    ssl_certificate_key /home/kevin/argocd-self-signed/tls.key;

    location / {
        proxy_pass http://linkerd_viz_npd_ingress;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
    }
}
