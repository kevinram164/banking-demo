# Nginx LB — Banking App qua k3d Traefik (Mô hình SSL 1)
# Copy: sudo cp nginx-banking-npd.co.conf /etc/nginx/conf.d/
# Cert:  dùng chung ~/argocd-self-signed hoặc tạo riêng CN=banking-npd.co
# Test:  curl -skI https://banking-npd.co/

upstream banking_npd_ingress {
    server 127.0.0.1:9080;
    keepalive 32;
}

server {
    listen 80;
    server_name banking-npd.co www.banking-npd.co;

    large_client_header_buffers 8 64k;
    client_header_buffer_size 64k;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name banking-npd.co www.banking-npd.co;

    ssl_certificate     /home/kevin/argocd-self-signed/tls.crt;
    ssl_certificate_key /home/kevin/argocd-self-signed/tls.key;

    large_client_header_buffers 8 64k;
    client_header_buffer_size 64k;

    location / {
        proxy_pass http://banking_npd_ingress;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";

        proxy_buffer_size 128k;
        proxy_buffers 8 128k;
        proxy_busy_buffers_size 256k;
        proxy_buffering off;
        proxy_read_timeout 3600;
    }
}
