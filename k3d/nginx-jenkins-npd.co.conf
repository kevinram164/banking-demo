# Nginx LB — Jenkins qua k3d Traefik (Mô hình SSL 1)
# Copy: sudo cp nginx-jenkins-npd.co.conf /etc/nginx/conf.d/

upstream jenkins_npd_ingress {
    server 127.0.0.1:9080;
    keepalive 32;
}

server {
    listen 80;
    server_name jenkins-npd.co;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name jenkins-npd.co;

    ssl_certificate     /home/kevin/argocd-self-signed/tls.crt;
    ssl_certificate_key /home/kevin/argocd-self-signed/tls.key;

    location / {
        proxy_pass http://jenkins_npd_ingress;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
    }
}
