# Nginx LB — Harbor qua k3d Traefik (Mô hình SSL 1)
# Copy: sudo cp nginx-harbor-npd.co.conf /etc/nginx/conf.d/
# Cert:  dùng chung ~/argocd-self-signed hoặc tạo CN=harbor-npd.co

upstream harbor_npd_ingress {
    server 127.0.0.1:9080;
    keepalive 32;
}

server {
    listen 80;
    server_name harbor-npd.co;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name harbor-npd.co;

    ssl_certificate     /home/kevin/argocd-self-signed/tls.crt;
    ssl_certificate_key /home/kevin/argocd-self-signed/tls.key;

    client_max_body_size 0;
    chunked_transfer_encoding on;

    location / {
        proxy_pass http://harbor_npd_ingress;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
        proxy_read_timeout 900;
    }
}
